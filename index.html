<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSRyuuu - Personal Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }
    .subtitle {
      color: #888;
      font-size: 1rem;
      margin-bottom: 48px;
    }
    .section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #666;
      margin-bottom: 16px;
      width: 100%;
      max-width: 640px;
    }
    .cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 640px;
      margin-bottom: 40px;
    }
    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      text-decoration: none;
      color: #e0e0e0;
      transition: all 0.2s ease;
    }
    .card:hover {
      background: #222;
      border-color: #444;
      transform: translateY(-2px);
    }
    .card-icon {
      font-size: 1.6rem;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #252525;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .card-body h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }
    .card-body p {
      font-size: 0.85rem;
      color: #888;
    }
    .badge {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
      margin-left: 8px;
      vertical-align: middle;
    }
    .badge-new { background: #2d4a2d; color: #6fcf6f; }
    .badge-wip { background: #4a3d2d; color: #cfaa6f; }
    footer {
      margin-top: auto;
      padding-top: 40px;
      color: #555;
      font-size: 0.8rem;
    }
    footer a { color: #888; text-decoration: none; }
    footer a:hover { color: #fff; }
  </style>
</head>
<body>
  <h1>HSRyuuu</h1>
  <p class="subtitle">Cheat Sheets, Projects & More</p>

  <div class="section-title">Cheat Sheets</div>
  <div class="cards">
    <a class="card" href="cheatsheets/claude-code.html">
      <div class="card-icon">&#x1F916;</div>
      <div class="card-body">
        <h3>Claude Code Cheat Sheet <span class="badge badge-new">NEW</span></h3>
        <p>Keyboard shortcuts, slash commands, MCP, skills, agents, CLI flags</p>
      </div>
    </a>
  </div>

  <!--
  <div class="section-title">Projects</div>
  <div class="cards">
    <a class="card" href="#">
      <div class="card-icon">&#x1F4C1;</div>
      <div class="card-body">
        <h3>Coming Soon <span class="badge badge-wip">WIP</span></h3>
        <p>Projects will be listed here</p>
      </div>
    </a>
  </div>
  -->

  <footer>
    <a href="https://github.com/HSRyuuu" target="_blank">GitHub</a>
  </footer>
</body>
</html>
